<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&amp;display=swap');
    </style>
  </defs>
  <!-- Rounded square background in mustard -->
  <rect width="32" height="32" rx="7" fill="#C9A84C"/>
  <!-- Subtle inner highlight -->
  <rect width="32" height="32" rx="7" fill="url(#shine)" opacity="0.15"/>
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <!-- "10" on top line -->
  <text
    x="16"
    y="14"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="700"
    fill="#FAF6EE"
    letter-spacing="-0.3"
  >10</text>
  <!-- Divider line -->
  <line x1="8" y1="17" x2="24" y2="17" stroke="#FAF6EE" stroke-width="1" opacity="0.7"/>
  <!-- "%" on bottom line -->
  <text
    x="16"
    y="26"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="11"
    font-weight="700"
    fill="#FAF6EE"
    letter-spacing="-0.3"
  >%</text>
</svg>
